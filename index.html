<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Политика (Часть 1) – Карточки</title>
  <style>
    :root {
      --bg-color: #f8fafc;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --card-front-bg: #ffffff;
      --card-back-bg: #eff6ff;
      --border-color: #e2e8f0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --success: #10b981;
      --shadow-color: rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      --bg-color: #0f172a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --card-front-bg: #1e293b;
      --card-back-bg: #172554;
      --border-color: #334155;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --success: #34d399;
      --shadow-color: rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }
    
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background-color: var(--bg-color);
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    @supports (-webkit-touch-callout: none) {
      html, body {
        height: -webkit-fill-available;
      }
    }

    :-webkit-full-screen {
      width: 100% !important;
      height: 100% !important;
      background-color: var(--bg-color);
    }

    .start-screen-overlay, .app-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .app-container {
      background: linear-gradient(135deg, var(--bg-color) 0%, var(--card-front-bg) 100%);
      color: var(--text-main);
      font-family: system-ui, -apple-system, sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      z-index: 1;
    }
    @media (min-width: 768px) {
      .app-container { padding: 1.5rem 1rem; }
    }

    .start-screen-overlay {
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 3rem;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    [data-theme="dark"] .start-screen-overlay {
      background-color: #0f172a;
    }
    .start-screen-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    
    .start-title {
      font-size: 2rem;
      font-weight: 800;
      color: #1e293b;
      text-align: center;
      margin: 0;
      padding: 0 1rem;
    }
    @media (min-width: 768px) {
      .start-title { font-size: 3rem; }
    }
    [data-theme="dark"] .start-title {
      color: #f8fafc;
    }

    .btn-start {
      font-size: 1.75rem;
      font-weight: 800;
      padding: 1.5rem 4rem;
      border-radius: 1.5rem;
      background: var(--accent);
      color: #ffffff;
      border: none;
      box-shadow: 0 10px 30px var(--shadow-color), 0 0 0 0 rgba(37, 99, 235, 0.4);
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      animation: pulse-start 2s infinite;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-start:hover {
      transform: scale(1.05) translateY(-5px);
      background: var(--accent-hover);
    }
    @keyframes pulse-start {
      0% { box-shadow: 0 10px 30px var(--shadow-color), 0 0 0 0 rgba(37, 99, 235, 0.4); }
      70% { box-shadow: 0 10px 30px var(--shadow-color), 0 0 0 20px rgba(37, 99, 235, 0); }
      100% { box-shadow: 0 10px 30px var(--shadow-color), 0 0 0 0 rgba(37, 99, 235, 0); }
    }

    /* Header */
    .header {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      flex-shrink: 0;
    }
    @media (min-width: 768px) {
      .header {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }
    }

    .header-title { font-size: 1.1rem; line-height: 1.2; font-weight: 700; margin: 0 0 0.25rem 0; }
    @media (min-width: 768px) {
      .header-title { font-size: 1.5rem; margin: 0 0 0.5rem 0; }
    }

    .header-subtitle { font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.35rem; margin: 0; line-height: 1.2; }
    @media (min-width: 768px) {
      .header-subtitle { font-size: 0.875rem; gap: 0.5rem; }
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .icon { width: 1.25rem; height: 1.25rem; flex-shrink: 0; }
    .icon-sm { width: 1rem; height: 1rem; }
    .icon-lg { width: 1.75rem; height: 1.75rem; }
    .text-success { color: var(--success); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border-color);
      background: var(--card-front-bg);
      color: var(--text-main);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { border-color: var(--accent); }
    .btn-icon { padding: 0.5rem; border-radius: 0.5rem; }
    
    .btn.btn-blue {
      background-color: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }
    .btn.btn-blue:hover {
      background-color: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    /* Tabs */
    .tabs-wrapper {
      width: 100%;
      max-width: 800px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      margin-bottom: 1rem;
      flex-shrink: 0;
    }
    .tabs-wrapper::-webkit-scrollbar { display: none; }
    @media (min-width: 768px) {
      .tabs-wrapper { margin-bottom: 1.5rem; }
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      padding-bottom: 0.5rem;
    }
    .tab {
      white-space: nowrap;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      background: var(--card-front-bg);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    #main-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-grow: 1;
      justify-content: flex-start;
      min-height: 0;
    }

    .status-text {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    /* Card */
    .card-wrapper {
      width: 100%;
      max-width: 600px;
      flex: 1 1 auto;
      min-height: 200px;
      max-height: 320px;
      perspective: 1000px;
      cursor: pointer;
      margin-bottom: 1.5rem;
      user-select: none;
      will-change: transform;
      -webkit-tap-highlight-color: transparent;
    }
    @media (min-width: 768px) { 
      .card-wrapper { 
        max-height: 384px; 
        margin-bottom: 2rem;
      } 
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      box-shadow: 0 10px 25px var(--shadow-color);
      border-radius: 1rem;
    }
    .card-wrapper.flipped .card-inner { transform: rotateX(180deg); }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem; 
      border-radius: 1rem;
      border-top: 4px solid;
      transition: background-color 0.3s ease, border-color 0.3s ease;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain; 
      scrollbar-width: thin;
      scrollbar-color: var(--border-color) transparent;
    }
    @media (min-width: 768px) {
      .card-face { padding: 4rem 1.5rem; }
    }

    .card-face::before {
      content: "";
      margin-top: auto;
    }
    .card-face::after {
      content: "";
      margin-bottom: auto;
    }

    .card-face::-webkit-scrollbar { width: 6px; }
    .card-face::-webkit-scrollbar-track { background: transparent; }
    .card-face::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 10px; }

    .card-front {
      background: var(--card-front-bg);
      border-top-color: var(--accent);
    }
    .card-back {
      background: var(--card-back-bg);
      border-top-color: var(--success);
      transform: rotateX(180deg);
    }

    .card-label {
      position: absolute;
      top: 1rem;
      left: 1rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .card-front .card-label { color: var(--accent); }
    .card-back .card-label { color: var(--success); }

    .card-content { 
      font-size: 1.15rem; 
      font-weight: 600; 
      line-height: 1.5; 
      width: 100%;
      text-align: center;
      word-wrap: break-word;
      overflow-wrap: break-word;
      flex-shrink: 0; 
      margin: 0;
    }
    @media (min-width: 768px) { .card-content { font-size: 1.5rem; } }
    .card-back .card-content { font-weight: 500; color: var(--text-main); }

    .card-hint {
      position: absolute;
      bottom: 1rem;
      font-size: 0.875rem;
      color: var(--text-muted);
      animation: pulse 2s infinite;
    }

    .swipe-badge {
      position: absolute;
      top: 2rem;
      padding: 0.5rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 800;
      font-size: 1.5rem;
      text-transform: uppercase;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      letter-spacing: 0.1em;
    }
    .swipe-badge-left {
      right: 2rem;
      color: #ef4444;
      border: 4px solid #ef4444;
      transform: rotate(15deg);
    }
    .swipe-badge-right {
      left: 2rem;
      color: #10b981;
      border: 4px solid #10b981;
      transform: rotate(-15deg);
    }

    .card-topic-hint {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px dashed var(--border-color);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      justify-content: center;
      text-align: center;
      flex-shrink: 0;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
      margin-bottom: 0.5rem;
    }
    @media (min-width: 768px) { .controls { gap: 1.5rem; margin-bottom: 1rem; } }

    .btn-control {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: var(--card-front-bg);
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-control:hover { transform: scale(1.05); border-color: var(--accent); }

    .btn-nav { width: 3rem; height: 3rem; }
    .btn-action { width: 3rem; height: 3rem; color: var(--text-muted); }
    .btn-action.active { background: var(--success); color: #fff; border-color: var(--success); }

    .btn-main {
      width: 3.5rem; height: 3.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      box-shadow: 0 4px 10px var(--shadow-color);
    }
    .btn-main:hover { background: var(--accent-hover); }
    @media (min-width: 768px) {
      .btn-nav, .btn-action { width: 3.5rem; height: 3.5rem; }
      .btn-main { width: 4rem; height: 4rem; }
    }

    .empty-state {
      padding: 3rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 1.125rem;
      display: none;
    }
  </style>
</head>
<body>

  <svg style="display: none;">
    <defs>

        <polyline points="15 18 9 12 15 6"></polyline>
      </symbol>

      </symbol>

        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>

      <symbol id="icon-minimize" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>
      </symbol>
    </defs>
  </svg>

  <div class="start-screen-overlay" id="start-screen">
    <h1 class="start-title">Раздел 4. Политика (Часть 1)</h1>
    <button class="btn-start" id="btn-big-start">Начать</button>
  </div>

  <div class="app-container" id="app-container">
    <div class="header">
      <div>
        <h1 class="header-title">Раздел 4. Политика (Часть 1)</h1>
        <p class="header-subtitle" id="header-subtitle">
          <svg class="icon icon-sm text-success"><use href="#icon-check-circle"></use></svg>
          <span id="file-status-text">Встроена полная база: раздел 4, часть 1 (85 карточек)</span>
        </p>
      </div>
      
      <div class="header-actions">
        <button class="btn btn-icon" id="btn-theme" title="Переключить тему">
          <svg class="icon"><use id="theme-icon-use" href="#icon-moon"></use></svg>
        </button>
        <button class="btn btn-icon btn-blue" id="btn-fullscreen" title="Полноэкранный режим">
          <svg class="icon"><use id="fullscreen-icon-use" href="#icon-maximize"></use></svg>
        </button>
      </div>
    </div>

    <div class="tabs-wrapper">
      <div class="tabs" id="tabs-container">
        <button class="tab active" data-tab="all" id="tab-all">Все термины (0)</button>
        <button class="tab" data-tab="learning" id="tab-learning">Осталось выучить (0)</button>
        <button class="tab" data-tab="learned" id="tab-learned">Выученные (0)</button>
      </div>
    </div>

    <div id="main-content">
      <div class="status-text" id="status-text">Карточка 1 из 0</div>

      <div class="card-wrapper" id="card-wrapper">
        <div class="swipe-badge swipe-badge-left" id="badge-left">Повторить</div>
        <div class="swipe-badge swipe-badge-right" id="badge-right">Выучил</div>
        <div class="card-inner">
          <div class="card-face card-front">
            <span class="card-label">Вопрос</span>
            <h2 class="card-content" id="card-question"></h2>
            <p class="card-hint">Нажмите, чтобы перевернуть</p>
          </div>
          <div class="card-face card-back">
            <span class="card-label">Ответ</span>
            <p class="card-content" id="card-answer"></p>
            <div class="card-topic-hint" id="card-topic-hint"></div>
          </div>
        </div>
      </div>

      <div class="controls" id="controls">
        <button class="btn-control btn-action" id="btn-shuffle" title="Перемешать все">
          <svg class="icon"><use href="#icon-shuffle"></use></svg>
        </button>
        <button class="btn-control btn-nav" id="btn-prev" title="Предыдущая">
          <svg class="icon"><use href="#icon-prev"></use></svg>
        </button>
        <button class="btn-control btn-main" id="btn-next" title="Следующая">
          <svg class="icon icon-lg"><use href="#icon-next"></use></svg>
        </button>
        <button class="btn-control btn-action" id="btn-check" title="Отметить как выученное">
          <svg class="icon"><use href="#icon-check"></use></svg>
        </button>
      </div>
    </div>

    <div class="empty-state" id="empty-state">
      В этой категории пока нет карточек.
    </div>
  </div>

  <script>
    // Жесткая блокировка системного скролла для предотвращения bounce-эффекта
    document.addEventListener('touchmove', function(e) {
      const isScrollable = e.target.closest('.card-face, .tabs-wrapper');
      if (!isScrollable) {
        if (e.cancelable) e.preventDefault();
      }
    }, { passive: false });

    // База карточек
    const defaultCards = [
      { id: '1', topic: 'Тема 1. ПОЛИТИКА И ВЛАСТЬ', question: 'Что такое политика?', answer: 'Это деятельность, направленная на управление обществом и распределение ресурсов и власти.' },
      { id: '2', topic: 'Тема 1. ПОЛИТИКА И ВЛАСТЬ', question: 'Что такое власть?', answer: 'Это способность и возможность одного человека или группы лиц оказывать влияние на других, управлять их поведением.' },
      { id: '3', topic: 'Тема 1. ПОЛИТИКА И ВЛАСТЬ', question: 'Назовите основные источники власти.', answer: 'К ним относятся: сила, авторитет, закон, богатство и харизма.' },
      { id: '4', topic: 'Тема 1. ПОЛИТИКА И ВЛАСТЬ', question: 'Что такое политическая власть?', answer: 'Право, способность и возможность отстаивать и претворять в жизнь определенные политические взгляды, установки и цели.' },
      { id: '5', topic: 'Тема 1. ПОЛИТИКА И ВЛАСТЬ', question: 'Что означает термин «легитимность власти»?', answer: 'Это признание обществом законности и справедливости действующей власти, готовность ей подчиняться.' },
      { id: '6', topic: 'Тема 1. ПОЛИТИКА И ВЛАСТЬ', question: 'Что такое легальность власти?', answer: 'Это формальная законность власти, ее соответствие действующей конституции и законам.' },
      { id: '7', topic: 'Тема 1. ПОЛИТИКА И ВЛАСТЬ', question: 'Назовите типы легитимности по Максу Веберу.', answer: 'К ним относятся: традиционный, харизматический и рационально-легальный типы.' },
      { id: '8', topic: 'Тема 1. ПОЛИТИКА И ВЛАСТЬ', question: 'В чем суть харизматического типа легитимности?', answer: 'Власть опирается на исключительные личные качества лидера и слепую веру в него масс.' },
      { id: '9', topic: 'Тема 1. ПОЛИТИКА И ВЛАСТЬ', question: 'Каковы основные функции политической власти?', answer: 'К ним относятся: управленческая, интегрирующая, контролирующая и мобилизационная.' },
      { id: '10', topic: 'Тема 1. ПОЛИТИКА И ВЛАСТЬ', question: 'Что такое государственной власть?', answer: 'Это вид политической власти, где субъектом выступает государство в лице своих органов и должностных лиц.' },
      { id: '11', topic: 'Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ', question: 'Что такое государство?', answer: 'Политико-территориальная суверенная организация публичной власти, обладающая аппаратом управления и принуждения.' },
      { id: '12', topic: 'Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ', question: 'Назовите главные признаки государства.', answer: 'К ним относятся: территория, публичная власть, суверенитет, налоги и правотворчество.' },
      { id: '13', topic: 'Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ', question: 'Что такое государственный суверенитет?', answer: 'Это независимость государства во внешней политике и верховенство его власти внутри страны.' },
      { id: '14', topic: 'Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ', question: 'В чем заключается монополия государства на легальное насилие?', answer: 'Только государство имеет законное право применять принуждение к гражданам для поддержания порядка.' },
      { id: '15', topic: 'Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ', question: 'Для чего государству необходимо право на взимание налогов?', answer: 'Для формирования бюджета, содержания аппарата управления и выполнения своих функций.' },
      { id: '16', topic: 'Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ', question: 'На какие две группы делятся функции государства?', answer: 'На внутренние и внешние.' },
      { id: '17', topic: 'Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ', question: 'Приведите примеры внутренних функций государства.', answer: 'К ним относятся: экономическая, социальная, правоохранительная, культурно-образовательная.' },
      { id: '18', topic: 'Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ', question: 'Приведите примеры внешних функций государства.', answer: 'К ним относятся: оборона страны, внешнеэкономическое сотрудничество, участие в решении глобальных проблем.' },
      { id: '19', topic: 'Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ', question: 'В чем суть социальной функции государства?', answer: 'В обеспечении достойного уровня жизни граждан, поддержке незащищенных слоев населения.' },
      { id: '20', topic: 'Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ', question: 'Какова цель правоохранительной функции государства?', answer: 'Защита прав и свобод граждан, обеспечение законности и правопорядка.' },
      { id: '21', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Что такое форма государства?', answer: 'Это устройство политической организации общества, призванное обеспечить его стабильность и нормальное функционирование.' },
      { id: '22', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Из каких трех элементов состоит форма государства?', answer: 'Форма правления, форма государственно-территориального устройства и политический режим.' },
      { id: '23', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Что такое форма правления?', answer: 'Это способ организации верховной государственной власти и порядок ее формирования.' },
      { id: '24', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'На какие два основных вида делится форма правления?', answer: 'На монархию и республику.' },
      { id: '25', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Что такое монархия?', answer: 'Форма правления, при которой верховная власть полностью или частично принадлежит одному лицу и передается по наследству.' },
      { id: '26', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Чем абсолютная монархия отличается от ограниченной (конституционной)?', answer: 'В абсолютной власть монарха ничем не ограничена, а в конституционной – ограничена парламентом и конституцией.' },
      { id: '27', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Что такое республика?', answer: 'Форма правления, при которой высшие органы власти избираются народом на строго определенный срок.' },
      { id: '28', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Назовите основные виды республик.', answer: 'К ним относятся: президентская, парламентская и смешанная (полупрезидентская).' },
      { id: '29', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'В чем главная особенность президентской республики?', answer: 'Президент избирается всенародно, является главой государства и сам формирует правительство.' },
      { id: '30', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Какова роль парламента в парламентской республике?', answer: 'Парламент формирует правительство, которое несет перед ним ответственность, и выбирает номинального президента.' },
      { id: '31', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Что такое форма государственно-территориального устройства?', answer: 'Это способ территориальной организации государства и распределения полномочий между центром и регионами.' },
      { id: '32', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Назовите три формы государственного устройства.', answer: 'Унитарное государство, федерация и конфедерация.' },
      { id: '33', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'В чем суть унитарного государства?', answer: 'Единое государство, части которого не обладают политической самостоятельностью (нет своих конституций и парламентов).' },
      { id: '34', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Что такое федерация?', answer: 'Сложное союзное государство, части которого (субъекты) обладают определенной политической самостоятельностью и своими законами.' },
      { id: '35', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Что такое конфедерация?', answer: 'Союз независимых государств, созданный для достижения конкретных политических или экономических целей.' },
      { id: '36', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Что такое политический режим?', answer: 'Совокупность методов и способов осуществления государственной власти.' },
      { id: '37', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'На какие два типа делятся политические режимы?', answer: 'На демократические и недемократические (авторитарные, тоталитарные).' },
      { id: '38', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Что такое тоталитаризм?', answer: 'Режим, при котором государство осуществляет всеобъемлющий (тотальный) контроль над всеми сферами жизни общества и частной жизнью граждан.' },
      { id: '39', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Назовите основные черты тоталитаризма.', answer: 'К ним относятся: единственная массовая партия, официальная идеология, массовый террор, монополия на СМИ.' },
      { id: '40', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Что такое авторитаризм?', answer: 'Режим, при котором власть жестко контролирует политическую сферу, но допускает определенную свободу в экономике и частной жизни.' },
      { id: '41', topic: 'Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)', question: 'Чем авторитаризм отличается от тоталитаризма?', answer: 'При авторитаризме нет тотального контроля над обществом, массового террора и обязательной идеологии, допускается рыночная экономика.' },
      { id: '42', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'Что такое орган государственной власти?', answer: 'Часть государственного аппарата, наделенная властными полномочиями для осуществления функций государства.' },
      { id: '43', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'Каков статус Президента РФ согласно Конституции?', answer: 'Президент является главой государства, гарантом Конституции и верховным главнокомандующим (не относится ни к одной из ветвей власти).' },
      { id: '44', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'Назовите высший орган законодательной власти в РФ.', answer: 'Федеральное Собрание (парламент).' },
      { id: '45', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'Из каких двух палат состоит Федеральное Собрание РФ?', answer: 'Из Совета Федерации (верхняя палата) и Государственной Думы (нижняя палата).' },
      { id: '46', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'Кто осуществляет исполнительную власть в РФ?', answer: 'Правительство Российской Федерации.' },
      { id: '47', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'К ведению какого органа относится объявление амнистии?', answer: 'Государственной Думы.' },
      { id: '48', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'Кто решает вопрос о возможности использования Вооруженных Сил РФ за пределами территории страны?', answer: 'Совет Федерации.' },
      { id: '49', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'К полномочиям какого органа относится разработка и исполнение федерального бюджета?', answer: 'Правительства РФ.' },
      { id: '50', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'Какой орган власти решает вопросы гражданства РФ и предоставления политического убежища?', answer: 'Президент РФ.' },
      { id: '51', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'Кто утверждает изменение границ между субъектами РФ?', answer: 'Совет Федерации.' },
      { id: '52', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'Кто назначает Председателя Центрального банка РФ?', answer: 'Государственная Дума.' },
      { id: '53', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'Кто осуществляет управление федеральной собственностью?', answer: 'Правительство РФ.' },
      { id: '54', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'К полномочиям какого органа относится помилование?', answer: 'Президента РФ.' },
      { id: '55', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'Кто осуществляет судебную власть в РФ?', answer: 'Суды (Конституционный Суд, Верховный Суд и суды общей юрисдикции).' },
      { id: '56', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'Что делает Конституционный Суд РФ?', answer: 'Проверяет законы и нормативные акты на соответствие Конституции РФ.' },
      { id: '57', topic: 'Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ', question: 'Назовите высший судебный орган по гражданским, уголовным, административным и иным делам.', answer: 'Верховный Суд РФ.' },
      { id: '58', topic: 'Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ', question: 'В чем суть принципа разделения властей?', answer: 'Распределение государственной власти на три независимые ветви (законодательную, исполнительную, судебную) для предотвращения узурпации.' },
      { id: '59', topic: 'Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ', question: 'Что такое «система сдержек и противовесов»?', answer: 'Механизм, при котором ветви власти взаимно контролируют и ограничивают друг друга, не допуская преобладания одной из них.' },
      { id: '60', topic: 'Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ', question: 'Назовите основные ветви власти.', answer: 'Законодательная, исполнительная и судебная.' },
      { id: '61', topic: 'Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ', question: 'Что такое демократия?', answer: 'Политический режим, при котором народ признается единственным источником власти и носителем суверенитета.' },
      { id: '62', topic: 'Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ', question: 'Перечислите основные признаки демократии.', answer: 'К ним относятся: выборность органов власти, политический плюрализм, свобода СМИ, гарантия прав и свобод человека.' },
      { id: '63', topic: 'Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ', question: 'Чем прямая (непосредственная) демократия отличается от представительной?', answer: 'При прямой народ сам принимает решения (референдум), при представительной – через избранных депутатов.' },
      { id: '64', topic: 'Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ', question: 'Что такое референдум?', answer: 'Всенародное голосование граждан по наиболее важным вопросам государственного или местного значения.' },
      { id: '65', topic: 'Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ', question: 'Что такое политический плюрализм?', answer: 'Многообразие политических идей, взглядов, партий и движений, конкурирующих между собой.' },
      { id: '66', topic: 'Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ', question: 'Какова роль меньшинства в демократическом обществе?', answer: 'Большинство принимает решения, но право меньшинства на оппозицию и выражение своего мнения гарантируется законом.' },
      { id: '67', topic: 'Тема 6. ПРАВОВОЕ ГОСУДАРСТВО', question: 'Что такое правовое государство?', answer: 'Демократическое государство, организация и деятельность которого подчинены праву и в котором гарантируются права и свободы граждан.' },
      { id: '68', topic: 'Тема 6. ПРАВОВОЕ ГОСУДАРСТВО', question: 'Назовите главный принцип правового государства.', answer: 'Верховенство закона во всех сферах жизни общества.' },
      { id: '69', topic: 'Тема 6. ПРАВОВОЕ ГОСУДАРСТВО', question: 'Что означает принцип взаимной ответственности государства и личности?', answer: 'Не только граждане несут ответственность перед законом, но и государство отвечает перед гражданами за невыполнение своих обязательств.' },
      { id: '70', topic: 'Тема 6. ПРАВОВОЕ ГОСУДАРСТВО', question: 'Является ли разделение властей признаком правового государства?', answer: 'Да, это один из важнейших принципов, защищающий общество от произвола власти.' },
      { id: '71', topic: 'Тема 6. ПРАВОВОЕ ГОСУДАРСТВО', question: 'Что означает «незыблемость прав и свобод человека»?', answer: 'Права человека даны ему от рождения, они признаются высшей ценностью, и государство обязано их соблюдать и защищать.' },
      { id: '72', topic: 'Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА', question: 'Что такое политическая система общества?', answer: 'Это совокупность политических институтов, норм, ценностей и взаимодействий, с помощью которых осуществляется политическая власть.' },
      { id: '73', topic: 'Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА', question: 'Назовите четыре основные подсистемы политической системы.', answer: 'Институциональная (организационная), нормативная, коммуникативная и культурно-идеологическая.' },
      { id: '74', topic: 'Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА', question: 'Что включает в себя институциональная подсистема?', answer: 'Государство, политические партии, общественно-политические движения, СМИ.' },
      { id: '75', topic: 'Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА', question: 'Из чего состоит нормативная подсистема политической системы?', answer: 'Из политических, правовых и моральных норм, обычаев и традиций, регулирующих политическую жизнь.' },
      { id: '76', topic: 'Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА', question: 'Что охватывает коммуникативная подсистема?', answer: 'Все формы взаимодействия и обмена информацией между участниками политического процесса.' },
      { id: '77', topic: 'Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА', question: 'Что относится к культурно-идеологической подсистеме?', answer: 'Политические идеи, идеологии, ценности, политическая культура и психология.' },
      { id: '78', topic: 'Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА', question: 'Какова главная функция политической системы?', answer: 'Определение целей развития общества, политическое руководство и интеграция общества.' },
      { id: '79', topic: 'Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО', question: 'Что такое гражданское общество?', answer: 'Совокупность негосударственных отношений и организаций, выражающих частные интересы и потребности свободных граждан.' },
      { id: '80', topic: 'Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО', question: 'В какой сфере возникает гражданское общество?', answer: 'Вне рамок властно-государственных структур, в сфере добровольной самоорганизации людей.' },
      { id: '81', topic: 'Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО', question: 'Назовите основные признаки гражданского общества.', answer: 'К ним относятся: частная собственность, свобода экономической деятельности, независимость от государства, горизонтальные связи.' },
      { id: '82', topic: 'Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО', question: 'Что понимается под «горизонтальными связями» в гражданском обществе?', answer: 'Равноправные отношения между свободными гражданами и их объединениями (в отличие от вертикальных связей подчинения в государстве).' },
      { id: '83', topic: 'Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО', question: 'Приведите примеры институтов гражданского общества.', answer: 'К ним относятся: политические партии, профсоюзы, благотворительные фонды, независимые СМИ, церковь, семья.' },
      { id: '84', topic: 'Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО', question: 'Какова главная функция гражданского общества?', answer: 'Защита частных интересов граждан, контроль за деятельностью государства и предотвращение его вмешательства в частную жизнь.' },
      { id: '85', topic: 'Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО', question: 'Как связаны гражданское общество и правовое государство?', answer: 'Они не могут существовать друг без друга: гражданское общество может развиваться только в условиях демократии и правового государства.' }
    ];

    let cards = [...defaultCards];
    let learnedIds = new Set();
    let activeTab = 'all';
    let currentIndex = 0;
    let isFlipped = false;
    let theme = 'light';

    const els = {
      startScreen: document.getElementById('start-screen'),
      btnBigStart: document.getElementById('btn-big-start'),
      appContainer: document.getElementById('app-container'),
      cardWrapper: document.getElementById('card-wrapper'),
      badgeLeft: document.getElementById('badge-left'),
      badgeRight: document.getElementById('badge-right'),
      cardQuestion: document.getElementById('card-question'),
      cardAnswer: document.getElementById('card-answer'),
      cardTopicHint: document.getElementById('card-topic-hint'),
      tabAll: document.getElementById('tab-all'),
      tabLearning: document.getElementById('tab-learning'),
      tabLearned: document.getElementById('tab-learned'),
      statusText: document.getElementById('status-text'),
      btnCheck: document.getElementById('btn-check'),
      themeIconUse: document.getElementById('theme-icon-use'),
      btnTheme: document.getElementById('btn-theme'),
      btnFullscreen: document.getElementById('btn-fullscreen'),
      fullscreenIconUse: document.getElementById('fullscreen-icon-use'),
      fileStatusText: document.getElementById('file-status-text'),
      emptyState: document.getElementById('empty-state'),
      mainContent: document.getElementById('main-content'),
      btnNext: document.getElementById('btn-next'),
      btnPrev: document.getElementById('btn-prev'),
      btnShuffle: document.getElementById('btn-shuffle')
    };

    function requestFullScreenSafe(element) {
      try {
        if (element.requestFullscreen) {
          element.requestFullscreen().catch(err => console.warn('Fullscreen err:', err));
        } else if (element.webkitRequestFullscreen) {
          element.webkitRequestFullscreen();
        } else if (element.msRequestFullscreen) {
          element.msRequestFullscreen();
        }
      } catch (e) {
        console.warn('API не поддерживается:', e);
      }
    }

    els.btnBigStart.addEventListener('click', () => {
      requestFullScreenSafe(document.documentElement);
      els.startScreen.classList.add('hidden');
      updateUI();
      scaleTextToFit();
    });

    els.btnFullscreen.addEventListener('click', () => {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        requestFullScreenSafe(document.documentElement);
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      }
    });

    function updateFullscreenIcon() {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        els.fullscreenIconUse.setAttribute('href', '#icon-minimize');
      } else {
        els.fullscreenIconUse.setAttribute('href', '#icon-maximize');
      }
    }
    
    document.addEventListener('fullscreenchange', updateFullscreenIcon);
    document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

    // Новейшая супер-надежная функция масштабирования текста
    function scaleTextToFit() {
      if (els.startScreen.classList.contains('hidden') === false) return;
      
      requestAnimationFrame(() => {
        const frontFace = document.querySelector('.card-front');
        const backFace = document.querySelector('.card-back');

        const fitText = (container, textElement) => {
          if (!container || !textElement || container.clientHeight === 0) return;
          
          // Временно отключаем 3D-переворот, чтобы получить 100% точные цифры от браузера
          const oldTransform = container.style.transform;
          const oldTransition = container.style.transition;
          
          container.style.transition = 'none';
          container.style.transform = 'none';
          
          // Базовый размер
          let fontSize = window.innerWidth >= 768 ? 24 : 18.4;
          textElement.style.fontSize = fontSize + 'px';
          
          const minFontSize = 12; 
          let safety = 50; 
          
          // Измеряем физическое переполнение контейнера с учетом всех паддингов и подсказок.
          // Если контент не влезает (scrollHeight > clientHeight) - сжимаем шрифт.
          while (container.scrollHeight > container.clientHeight + 2 && fontSize > minFontSize && safety > 0) {
            fontSize -= 0.5;
            textElement.style.fontSize = fontSize + 'px';
            safety--;
          }

          // Возвращаем исходное состояние карточки (с переворотом и анимациями)
          container.style.transform = oldTransform;
          container.style.transition = oldTransition;
        };

        fitText(frontFace, els.cardQuestion);
        fitText(backFace, els.cardAnswer);
      });
    }

    window.addEventListener('resize', scaleTextToFit);

    function getFilteredCards() {
      return cards.filter(card => {
        if (activeTab === 'learned') return learnedIds.has(card.id);
        if (activeTab === 'learning') return !learnedIds.has(card.id);
        return true;
      });
    }

    function updateUI() {
      els.tabAll.textContent = `Все термины (${cards.length})`;
      els.tabLearning.textContent = `Осталось выучить (${cards.length - learnedIds.size})`;
      els.tabLearned.textContent = `Выученные (${learnedIds.size})`;

      const filtered = getFilteredCards();

      if (filtered.length === 0) {
        els.mainContent.style.display = 'none';
        els.emptyState.style.display = 'block';
      } else {
        els.mainContent.style.display = 'flex';
        els.emptyState.style.display = 'none';

        if (currentIndex >= filtered.length) currentIndex = 0;

        const currentCard = filtered[currentIndex];
        els.cardQuestion.textContent = currentCard.question;
        els.cardAnswer.textContent = currentCard.answer;
        els.statusText.textContent = `Карточка ${currentIndex + 1} из ${filtered.length}`;

        if (currentCard.topic) {
          const match = currentCard.topic.match(/^(Тема\s*\d+\.?)/i);
          const shortTopic = match ? match[1] : currentCard.topic;
          els.cardTopicHint.innerHTML = `<svg class="icon icon-sm"><use href="#icon-book"></use></svg> <span>${shortTopic}</span>`;
          els.cardTopicHint.style.display = 'flex';
        } else {
          els.cardTopicHint.style.display = 'none';
        }

        if (learnedIds.has(currentCard.id)) {
          els.btnCheck.classList.add('active');
          els.btnCheck.title = 'Убрать из выученных';
        } else {
          els.btnCheck.classList.remove('active');
          els.btnCheck.title = 'Отметить как выученное';
        }

        scaleTextToFit();
      }
    }

    function switchTab(tabId) {
      activeTab = tabId;
      currentIndex = 0;
      isFlipped = false;
      els.cardWrapper.classList.remove('flipped');
      
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-${tabId}`).classList.add('active');
      
      updateUI();
    }

    els.tabAll.addEventListener('click', () => switchTab('all'));
    els.tabLearning.addEventListener('click', () => switchTab('learning'));
    els.tabLearned.addEventListener('click', () => switchTab('learned'));

    let startX = 0, startY = 0, currentX = 0;
    let isDragging = false;
    let hasDragged = false;
    let isScrolling = false;
    let wasSwiped = false; 

    function handleDragStart(clientX, clientY) {
      isDragging = true;
      hasDragged = false;
      isScrolling = false;
      wasSwiped = false;
      startX = clientX;
      startY = clientY;
      currentX = startX;
      els.cardWrapper.style.transition = 'none';
    }

    function handleDragMove(clientX, clientY, e) {
      if (!isDragging) return;
      
      currentX = clientX;
      const deltaX = currentX - startX;
      const deltaY = clientY - startY;

      if (!hasDragged && !isScrolling) {
        if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 5) {
          isScrolling = true;
          isDragging = false; 
          els.cardWrapper.style.transition = 'transform 0.25s ease';
          els.cardWrapper.style.transform = 'translateX(0) rotate(0)';
          return;
        }
        if (Math.abs(deltaX) > 5) {
          hasDragged = true;
        }
      }

      if (isScrolling) return;

      if (hasDragged) {
        if (e.cancelable) e.preventDefault(); 
        
        wasSwiped = true;
        const rotate = deltaX * 0.05;
        els.cardWrapper.style.transform = `translateX(${deltaX}px) rotate(${rotate}deg)`;
        
        if (deltaX > 20) {
          els.badgeRight.style.opacity = Math.min(deltaX / 100, 1);
          els.badgeLeft.style.opacity = 0;
        } else if (deltaX < -20) {
          els.badgeLeft.style.opacity = Math.min(Math.abs(deltaX) / 100, 1);
          els.badgeRight.style.opacity = 0;
        } else {
          els.badgeRight.style.opacity = 0;
          els.badgeLeft.style.opacity = 0;
        }
      }
    }

    function handleDragEnd() {
      if (!isDragging) return;
      isDragging = false;
      
      if (isScrolling) return;

      const deltaX = currentX - startX;
      
      els.cardWrapper.style.transition = 'transform 0.3s ease-out';

      const threshold = Math.max(window.innerWidth * 0.25, 80);

      if (hasDragged) {
        if (deltaX > threshold) {
          handleSwipe('right');
        } else if (deltaX < -threshold) {
          handleSwipe('left');
        } else {
          els.cardWrapper.style.transform = 'translateX(0) rotate(0)';
          els.badgeRight.style.opacity = 0;
          els.badgeLeft.style.opacity = 0;
        }
      }
    }

    els.cardWrapper.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      handleDragStart(e.clientX, e.clientY);
    });
    window.addEventListener('mousemove', (e) => {
      handleDragMove(e.clientX, e.clientY, e);
    }, { passive: false });
    window.addEventListener('mouseup', handleDragEnd);

    els.cardWrapper.addEventListener('touchstart', (e) => {
      handleDragStart(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    
    window.addEventListener('touchmove', (e) => {
      handleDragMove(e.touches[0].clientX, e.touches[0].clientY, e);
    }, { passive: false });
    
    window.addEventListener('touchend', handleDragEnd);
    window.addEventListener('touchcancel', handleDragEnd);

    function handleSwipe(direction) {
      const filtered = getFilteredCards();
      if (filtered.length === 0) return;
      const currentCard = filtered[currentIndex];

      const throwX = direction === 'right' ? window.innerWidth : -window.innerWidth;
      const rotate = direction === 'right' ? 30 : -30;
      els.cardWrapper.style.transform = `translateX(${throwX}px) rotate(${rotate}deg)`;
      
      setTimeout(() => {
        if (direction === 'right') {
          learnedIds.add(currentCard.id);
        } else {
          learnedIds.delete(currentCard.id);
        }

        const newFiltered = cards.filter(c => {
          if (activeTab === 'learned') return learnedIds.has(c.id);
          if (activeTab === 'learning') return !learnedIds.has(c.id);
          return true;
        });

        if (newFiltered.length > 0) {
          if (newFiltered.find(c => c.id === currentCard.id)) {
            currentIndex = (currentIndex + 1) % newFiltered.length;
          } else {
            if (currentIndex >= newFiltered.length) currentIndex = 0;
          }
        } else {
          currentIndex = 0;
        }

        isFlipped = false;
        els.cardWrapper.classList.remove('flipped');
        
        els.cardWrapper.style.transition = 'none';
        els.cardWrapper.style.transform = 'translateX(0) rotate(0)';
        els.badgeRight.style.opacity = 0;
        els.badgeLeft.style.opacity = 0;
        
        updateUI();
      }, 300);
    }

    els.cardWrapper.addEventListener('click', (e) => {
      if (wasSwiped) {
        e.preventDefault();
        return;
      }
      isFlipped = !isFlipped;
      els.cardWrapper.classList.toggle('flipped', isFlipped);
    });

    els.btnNext.addEventListener('click', () => {
      const filtered = getFilteredCards();
      if (filtered.length <= 1) return;
      isFlipped = false;
      els.cardWrapper.classList.remove('flipped');
      setTimeout(() => {
        currentIndex = (currentIndex + 1) % filtered.length;
        updateUI();
      }, 150);
    });

    els.btnPrev.addEventListener('click', () => {
      const filtered = getFilteredCards();
      if (filtered.length <= 1) return;
      isFlipped = false;
      els.cardWrapper.classList.remove('flipped');
      setTimeout(() => {
        currentIndex = (currentIndex - 1 + filtered.length) % filtered.length;
        updateUI();
      }, 150);
    });

    els.btnShuffle.addEventListener('click', () => {
      const filtered = getFilteredCards();
      if (filtered.length <= 1) return;
      isFlipped = false;
      els.cardWrapper.classList.remove('flipped');
      setTimeout(() => {
        cards.sort(() => Math.random() - 0.5);
        currentIndex = 0;
        updateUI();
      }, 150);
    });

    els.btnCheck.addEventListener('click', () => {
      const filtered = getFilteredCards();
      if (filtered.length === 0) return;
      const currentCard = filtered[currentIndex];
      
      if (learnedIds.has(currentCard.id)) {
        learnedIds.delete(currentCard.id);
      } else {
        learnedIds.add(currentCard.id);
      }
      updateUI();
    });

    els.btnTheme.addEventListener('click', () => {
      theme = theme === 'light' ? 'dark' : 'light';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        els.themeIconUse.setAttribute('href', '#icon-sun');
      } else {
        document.documentElement.removeAttribute('data-theme');
        els.themeIconUse.setAttribute('href', '#icon-moon');
      }
    });

    updateUI();
  </script>
</body>
</html>
